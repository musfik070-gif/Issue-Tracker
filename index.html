<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<!-- Font Awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- Geist Fonts  -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

<!-- Tailwind -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-[Geist]">

<!-- Login Card -->
<div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
        <img src="assets/github-logo.png" alt="GitHub Logo"
        class="w-20 h-20">
    </div>

    <!-- Title -->
    <h1 class="text-2xl font-bold text-center text-gray-800">
        GitHub Issues Tracker
    </h1>

    <p class="text-center text-gray-500 mb-8">
        Sign in to manage your issues
    </p>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-5">

        <!-- Username -->
        <div>
            <label class="font-semibold text-gray-800">Username</label>

            <input 
            id="username"
            type="text"
            placeholder="Enter Username"
            class="input w-full bg-transparent border border-gray-300" />

            <p class="text-sm mt-1 text-primary">
                Default: admin
            </p>
        </div>

        <!-- Password -->
        <div>
            <label class="font-semibold text-gray-800">Password</label>

            <input 
            id="password"
            type="password"
            placeholder="Enter Password"
            class="input input-bordered w-full bg-transparent border border-gray-300" />

            <p class="text-sm mt-1 text-primary">
                Default: admin123
            </p>
        </div>

        <!-- Sign In Button -->
        <button 
        type="submit"
        class="btn bg-gradient-to-r from-purple-600 to-indigo-600 text-white border-none w-full">

        Sign In

        </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center gap-4 my-6">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="text-gray-500 text-sm">OR</span>
        <div class="flex-1 h-px bg-gray-300"></div>
    </div>

    <!-- Demo Credentials -->
     <p class="text-gray-600 mb-3 justify-center flex">
            Demo Credentials:
        </p>
    <div class="bg-gray-100 rounded-lg p-5 text-center">
        <p class="font-semibold text-gray-800">
            Username: <span class="font-normal">admin</span>
        </p>

        <p class="font-semibold text-gray-800">
            Password: <span class="font-normal">admin123</span>
        </p>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
