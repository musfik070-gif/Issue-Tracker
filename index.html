<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>


<!-- Geist Fonts  -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-[Geist]">

<!-- Login Card -->
<div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
        <img src="assets/github-logo.png" alt="GitHub Logo"
        class="w-20 h-20">
    </div>

    <!-- Title -->
    <h1 class="text-2xl font-bold text-center text-gray-800">
        GitHub Issues Tracker
    </h1>

    <p class="text-center text-gray-500 mb-8">
        Sign in to manage your issues
    </p>


</div>

<script src="login.js"></script>

</body>
</html>
