<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<!-- Font Awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- Geist Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,20OTH;1,9００&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

<!-- Tailwind -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 font-[Geist]">

<!-- navbar -->
<nav class="bg-white shadow-sm border-b">

<div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">

<div class="flex items-center gap-2 w-full justify-center md:justify-start md:w-auto">

<img src="./assets/github-logo.png"
class="w-6 h-6">

<h2 class="font-semibold text-gray-800 text-lg sm:text-base text-center">
GitHub Issues Tracker
</h2>

</div>

<div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">

<input 
id="searchInput"
type="text"
placeholder="Search issues..."
class="input input-bordered w-full sm:w-56">

<button id="newIssueBtn" class="btn bg-gradient-to-r from-purple-600 to-indigo-600 text-white border-none w-full sm:w-auto whitespace-nowrap">
+ New Issue
</button>

</div>

</div>

</nav>

<!-- Main Div -->
<div class="max-w-7xl mx-auto p-6">

<!-- Tab Start -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex gap-3">
  
  <button data-tab="all"
    class="tab-btn px-4 py-2 rounded-md bg-gradient-to-r from-purple-500 to-indigo-600 text-white">
    All
  </button>

  <button data-tab="open"
    class="tab-btn px-4 py-2 rounded-md border border-gray-300 text-gray-700">
    Open
  </button>

  <button data-tab="closed"
    class="tab-btn px-4 py-2 rounded-md border border-gray-300 text-gray-700">
    Closed
  </button>

</div>

<!-- Issue Grid Start -->

<div class="bg-white rounded-xl shadow-sm mb-6">

<div class="flex justify-between items-center p-5 border-b">

<div class="flex items-center gap-3">

<div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">

<i class="fa-solid fa-circle-exclamation text-purple-600 text-xl"></i>

</div>

<div>

<h3 id="issueCount" class="font-semibold text-gray-800">
0 Issues
</h3>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>

</div>

</div>

<div class="flex items-center gap-5 text-sm">
    <div class="flex items-center gap-1">
        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
        Open
    </div>
    <div class="flex items-center gap-1">
        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
        Closed
    </div>
</div>

</div>

<div id="issuesContainer" class="p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
</div>

</div>

<!-- ISSUE DETAILS MODAL -->
<div id="issueModal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50">

  <div class="bg-white rounded-xl shadow-lg w-[90%] max-w-2xl p-6 relative">

    <!-- Title -->
    <h2 id="modalTitle" class="text-2xl font-bold mb-3"></h2>

    <!-- Status + Author -->
    <div class="flex items-center gap-3 text-sm text-gray-600 mb-4">

      <span id="modalStatus" class="px-3 py-1 rounded-full text-white text-xs"></span>

      <span id="modalAuthor"></span>

      <span id="modalDate"></span>

    </div>

    <!-- Labels -->
    <div id="modalLabels" class="flex gap-2 mb-4 flex-wrap"></div>

    <!-- Description -->
    <p id="modalDescription" class="text-gray-600 mb-6"></p>

    <!-- Info box -->
    <div class="bg-gray-100 rounded-lg p-4 flex justify-between">

      <div>
        <p class="text-gray-500 text-sm">Assignee:</p>
        <p id="modalAssignee" class="font-semibold"></p>
      </div>

      <div>
        <p class="text-gray-500 text-sm">Priority:</p>
        <span id="modalPriority" class="px-3 py-1 rounded-full text-white text-xs"></span>
      </div>

    </div>

    <!-- Close Button -->
    <div class="flex justify-end mt-6">
      <button id="closeModal"
        class="px-6 py-2 rounded-md text-white bg-gradient-to-r from-purple-500 to-indigo-600">
        Close
      </button>
    </div>

  </div>

</div>

<!-- NEW ISSUE MODAL -->
<div id="newIssueModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

  <div class="bg-white rounded-xl w-[90%] max-w-lg p-6">

    <h2 class="text-xl font-bold mb-4">Create New Issue</h2>

    <div class="space-y-3">

      <input id="issueTitle" type="text" placeholder="Issue Title"
        class="input input-bordered w-full"/>

      <textarea id="issueDescription" placeholder="Issue Description"
        class="textarea textarea-bordered w-full"></textarea>

      <input id="issueAuthor" type="text" placeholder="Author"
        class="input input-bordered w-full"/>

      <input id="issueLabel" type="text" placeholder="Label (example: bug)"
        class="input input-bordered w-full"/>

      <select id="issueStatus" class="select select-bordered w-full">
        <option value="open">Open</option>
        <option value="closed">Closed</option>
      </select>

      <select id="issuePriority" class="select select-bordered w-full">
        <option value="HIGH">High</option>
        <option value="MEDIUM">Medium</option>
        <option value="LOW">Low</option>
      </select>

    </div>

    <div class="flex justify-end gap-3 mt-5">

      <button id="cancelIssue"
        class="btn btn-outline">
        Cancel
      </button>

      <button id="createIssue"
        class="btn bg-gradient-to-r from-purple-500 to-indigo-600 text-white border-none">
        Create Issue
      </button>

    </div>

  </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
