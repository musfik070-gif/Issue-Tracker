<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<!-- Font Awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- Geist Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,20OTH;1,9００&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

<!-- Tailwind -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 font-[Geist]">

<!-- navbar -->
<nav class="bg-white shadow-sm border-b">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<!-- Left -->
<div class="flex items-center gap-2">

<img src="https://cdn-icons-png.flaticon.com/512/733/733553.png"
class="w-6 h-6">

<h2 class="font-semibold text-gray-800">
GitHub Issues Tracker
</h2>

</div>

<!-- Right -->
<div class="flex items-center gap-3">

<input 
type="text"
placeholder="Search issues..."
class="input input-bordered w-56">

<button class="btn bg-gradient-to-r from-purple-600 to-indigo-600 text-white border-none">
+ New Issue
</button>

</div>

</div>

</nav>

<!-- Main Div -->
<div class="max-w-7xl mx-auto p-6">

<!-- Tab Start -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex gap-3">
  
  <button data-tab="all"
    class="tab-btn px-4 py-2 rounded-md bg-gradient-to-r from-purple-500 to-indigo-600 text-white">
    All
  </button>

  <button data-tab="open"
    class="tab-btn px-4 py-2 rounded-md border border-gray-300 text-gray-700">
    Open
  </button>

  <button data-tab="closed"
    class="tab-btn px-4 py-2 rounded-md border border-gray-300 text-gray-700">
    Closed
  </button>

</div>

<!-- Issue Grid Start -->

<div class="bg-white rounded-xl shadow-sm mb-6">

<div class="flex justify-between items-center p-5 border-b">

<div class="flex items-center gap-3">

<div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">

<span class="text-purple-600 font-bold">
◎
</span>

</div>

<div>

<h3 class="font-semibold text-gray-800">
50 Issues
</h3>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>

</div>

</div>

<div class="flex items-center gap-5 text-sm">
    <div class="flex items-center gap-1">
        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
        Open
    </div>
    <div class="flex items-center gap-1">
        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
        Closed
    </div>
</div>

</div>

<div id="issuesContainer" class="p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
